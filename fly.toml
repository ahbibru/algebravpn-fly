app = "algebravpn-fly"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  
  [http_service.checks]
    [http_service.checks.status]
      grace_period = "10s"
      interval = "15s"
      timeout = "5s"
      method = "GET"
      path = "/"
